# ============================================================================
# tmux configuration (portable across Ubuntu/WSL and macOS)
# ============================================================================

# ---- General -------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color support
set -g mouse on                              # mouse support
set -g history-limit 50000
set -sg escape-time 10                       # faster command sequences
set -g focus-events on
setw -g mode-keys vi                         # vi-style copy mode

# ---- Indexing ------------------------------------------------------------
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                     # panes start at 1
set -g renumber-windows on                   # renumber when a window closes

# ---- Prefix --------------------------------------------------------------
# Default prefix Ctrl-b (estándar, igual en Mac y WSL)
set -g prefix C-b
bind C-b send-prefix

# ---- Key bindings --------------------------------------------------------
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Split panes using | and - , keeping the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Status bar ----------------------------------------------------------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default fg=white"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=cyan] %Y-%m-%d #[fg=white]%H:%M "
setw -g window-status-current-style "fg=black bg=cyan bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
